<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RustDesk 自定义客户端生成器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
      }
      body {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(245, 249, 255, 0.96)),
          linear-gradient(90deg, rgba(23, 105, 224, 0.08) 1px, transparent 1px),
          linear-gradient(0deg, rgba(23, 105, 224, 0.08) 1px, transparent 1px);
        background-size: auto, 42px 42px, 42px 42px;
        color: #10223d;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      main {
        padding: 1rem;
        text-align: center;
      }
      h1 {
        font-size: 2.5rem;
        line-height: 1.1;
        margin: 0;
      }
      @media screen and (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }
      }
      h1::after {
        content: "";
        background-color: #1769e0;
        background: #1769e0;
        display: block;
        height: 0.5rem;
        margin-top: 1rem;
      }
      img {
        max-width: 100%;
        height: auto;
      }
      p {
        margin: 1rem 0 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RustDesk 自定义客户端生成器</h1>
      <p>生成器正在维护中，请稍后再试。</p>
    </main>
  </body>
</html>
